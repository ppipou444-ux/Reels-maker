<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب — ReelzMaker</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#050508; --ink:#f5f5f0; --muted:#666680;
  --accent:#ff2d6b; --accent2:#7c3aed; --accent3:#06b6d4;
  --surface:#0e0e14; --border:rgba(255,255,255,0.07); --card:#111118;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;}

/* Background */
.bg-mesh {
  position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 60% at 80% 20%, rgba(124,58,237,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 20% 80%, rgba(255,45,107,0.1) 0%, transparent 50%);
}

nav {
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 2.5rem;
  border-bottom:1px solid var(--border);
}

.nav-logo {
  font-family:'Space Mono',monospace;font-weight:700;font-size:1.1rem;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-decoration:none;
}

.back-link {color:var(--muted);text-decoration:none;font-size:0.88rem;transition:color 0.2s;}
.back-link:hover{color:var(--ink);}

.page-body {
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:3rem 1.5rem;position:relative;z-index:1;
}

.auth-container {
  width:100%;max-width:440px;
}

.auth-header {text-align:center;margin-bottom:2.5rem;}
.auth-header h1 {font-size:2rem;font-weight:900;letter-spacing:-1px;margin-bottom:0.5rem;}
.auth-header p {color:var(--muted);font-size:0.9rem;}

.plan-pill {
  display:inline-flex;align-items:center;gap:0.4rem;
  background:rgba(255,45,107,0.1);border:1px solid rgba(255,45,107,0.3);
  padding:0.3rem 0.9rem;border-radius:999px;
  font-size:0.75rem;font-weight:700;color:var(--accent);
  margin-bottom:1.2rem;
}

.auth-card {
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:2rem;
}

.form-group {margin-bottom:1.2rem;}
.form-label {font-size:0.82rem;font-weight:700;color:var(--muted);display:block;margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:1px;}

.form-input {
  width:100%;padding:0.8rem 1rem;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:10px;
  color:var(--ink);font-family:'Tajawal',sans-serif;font-size:0.95rem;
  outline:none;transition:border-color 0.2s,box-shadow 0.2s;
}
.form-input:focus {border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,45,107,0.1);}
.form-input::placeholder{color:var(--muted);}

.divider {
  display:flex;align-items:center;gap:1rem;margin:1.5rem 0;
  color:var(--muted);font-size:0.8rem;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

.social-btn {
  width:100%;padding:0.8rem;border-radius:10px;
  border:1px solid var(--border);background:transparent;
  color:var(--ink);font-family:'Tajawal',sans-serif;font-size:0.9rem;font-weight:700;
  cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;gap:0.6rem;
  margin-bottom:0.7rem;
}
.social-btn:hover{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.04);}

.submit-btn {
  width:100%;padding:0.95rem;border-radius:10px;border:none;
  background:var(--accent);color:#fff;
  font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;
  cursor:pointer;transition:all 0.3s;margin-top:0.5rem;
}
.submit-btn:hover{background:#ff4d80;transform:translateY(-2px);box-shadow:0 10px 30px rgba(255,45,107,0.35);}

.form-footer {text-align:center;margin-top:1.5rem;font-size:0.85rem;color:var(--muted);}
.form-footer a{color:var(--accent);text-decoration:none;}
.form-footer a:hover{text-decoration:underline;}

.terms-note {text-align:center;font-size:0.75rem;color:var(--muted);margin-top:1.2rem;line-height:1.6;}
.terms-note a{color:var(--muted);text-decoration:underline;}

/* Benefits sidebar (shown as bottom strip on small screens) */
.benefits {
  display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;
  margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border);
}
.benefit {display:flex;align-items:center;gap:0.4rem;font-size:0.78rem;color:var(--muted);}
.benefit span{color:var(--accent);}
</style>
</head>
<body>
<div class="bg-mesh"></div>

<nav>
  <a href="index.html" class="nav-logo">ReelzMaker</a>
  <a href="index.html" class="back-link">← العودة للرئيسية</a>
</nav>

<div class="page-body">
  <div class="auth-container">
    <div class="auth-header">
      <div class="plan-pill">⭐ باقة Pro — تجربة 7 أيام مجانية</div>
      <h1>أنشئ حسابك</h1>
      <p>ابدأ مجاناً، لا حاجة لبطاقة ائتمان</p>
    </div>

    <div class="auth-card">

      <!-- Social signup -->
      <button class="social-btn" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        التسجيل بـ Google
      </button>

      <div class="divider">أو بالبريد الإلكتروني</div>

      <!-- Email form -->
      <div>
        <div class="form-group">
          <label class="form-label">الاسم الكامل</label>
          <input type="text" class="form-input" placeholder="محمد أحمد" id="nameInput">
        </div>
        <div class="form-group">
          <label class="form-label">البريد الإلكتروني</label>
          <input type="email" class="form-input" placeholder="example@email.com" id="emailInput">
        </div>
        <div class="form-group">
          <label class="form-label">كلمة المرور</label>
          <input type="password" class="form-input" placeholder="8 أحرف على الأقل" id="passInput">
        </div>
        <button class="submit-btn" onclick="handleSignup()">🚀 إنشاء الحساب مجاناً</button>
      </div>

      <p class="form-footer">لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
    </div>

    <p class="terms-note">بالتسجيل، أنت توافق على <a href="#">شروط الخدمة</a> و<a href="#">سياسة الخصوصية</a></p>

    <div class="benefits">
      <div class="benefit"><span>✓</span> 5 فيديوهات مجانية</div>
      <div class="benefit"><span>✓</span> بدون بطاقة ائتمان</div>
      <div class="benefit"><span>✓</span> الإلغاء في أي وقت</div>
    </div>
  </div>
</div>

<script>
function handleGoogle() {
  alert('⚙️ سيتم ربط Google OAuth عبر Supabase\n\nالخطوة: supabase.auth.signInWithOAuth({ provider: "google" })');
}

function handleSignup() {
  const name  = document.getElementById('nameInput').value;
  const email = document.getElementById('emailInput').value;
  const pass  = document.getElementById('passInput').value;

  if (!name || !email || !pass) {
    alert('يرجى ملء جميع الحقول');
    return;
  }
  if (pass.length < 8) {
    alert('كلمة المرور يجب أن تكون 8 أحرف على الأقل');
    return;
  }

  // Simulate signup
  alert('✅ تم إنشاء الحساب!\n\n⚙️ في الإنتاج:\nsupabase.auth.signUp({ email, password })\n\nثم تُحوَّل إلى: app.html');
  window.location.href = 'app.html';
}
</script>
</body>
</html>
